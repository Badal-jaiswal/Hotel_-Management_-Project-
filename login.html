<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .wave {
            animation: waveMove 6s infinite linear;
        }

        @keyframes waveMove {
            0% { transform: translateX(0); }
            100% { transform: translateX(-120px); }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 h-screen flex items-center justify-center overflow-hidden">

    <!-- Login Card -->
    <div class="backdrop-blur-lg bg-white/20 p-8 rounded-2xl shadow-2xl w-80 relative z-10 border border-white/30">

        <h2 class="text-2xl font-bold text-center text-white mb-6">Login Account</h2>

        <input type="email" id="email" placeholder="Enter Email"
            class="w-full mb-4 p-2 rounded-lg bg-white/30 text-white placeholder-white focus:outline-none focus:ring-2 focus:ring-pink-300 transition">

        <input type="password" id="password" placeholder="Enter Password"
            class="w-full mb-4 p-2 rounded-lg bg-white/30 text-white placeholder-white focus:outline-none focus:ring-2 focus:ring-pink-300 transition">

        <button id="btn"
            class="w-full bg-pink-500 text-white p-2 rounded-lg hover:bg-pink-600 hover:scale-105 transition duration-300 shadow-lg">
            Login
        </button>

    </div>

    <!-- Wave Background -->
    <div class="absolute bottom-0 left-0 w-full z-0">
        <svg class="wave w-[200%]" viewBox="0 0 1440 320">
            <path fill="#ffffff" fill-opacity="0.3"
                d="M0,160L80,170C160,180,320,200,480,186.7C640,173,800,120,960,112C1120,105,1280,150,1360,170L1440,192L1440,320L0,320Z">
            </path>
        </svg>

        <svg class="wave w-[200%] mt-[-100px]" viewBox="0 0 1440 320">
            <path fill="#ffffff" fill-opacity="0.5"
                d="M0,192L80,186.7C160,181,320,171,480,165.3C640,160,800,160,960,165.3C1120,171,1280,181,1360,186.7L1440,192L1440,320L0,320Z">
            </path>
        </svg>
    </div>

    <!-- JS LOGIC (NO CHANGE) -->
    <script>

        document.getElementById("btn").addEventListener("click", function () {

            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;

            let storedEmail = localStorage.getItem("email");

            let storedpassword = localStorage.getItem("password");

            if (email === storedEmail && password === storedpassword) {

                alert("sucessfuly login");

            } else {
                alert("Invalid email and password");
            }

        })

    </script>

</body>

</html>
