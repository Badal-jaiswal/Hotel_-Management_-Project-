<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Signup</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
/* Smooth wave animation */
.wave {
  animation: waveMove 8s linear infinite;
}

@keyframes waveMove {
  0% { transform: translateX(0); }
  100% { transform: translateX(-120px); }
}

/* floating glow */
.glow {
  box-shadow: 0 0 40px rgba(236, 72, 153, 0.3);
}
</style>
</head>

<body class="h-screen overflow-hidden flex items-center justify-center bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500">

<!-- background blur circles -->
<div class="absolute top-10 left-10 w-72 h-72 bg-pink-400 rounded-full blur-3xl opacity-30"></div>
<div class="absolute bottom-10 right-10 w-72 h-72 bg-indigo-300 rounded-full blur-3xl opacity-30"></div>

<!-- Signup Card -->
<div class="relative z-10 w-96 p-8 rounded-3xl 
backdrop-blur-xl bg-white/10 border border-white/20
glow transition hover:scale-[1.02] duration-300">

<h2 class="text-3xl font-bold text-white text-center mb-6">
Create Account
</h2>

<input id="name" type="text" placeholder="Full Name"
class="w-full mb-4 p-3 rounded-xl bg-white/10 text-white placeholder-white/70
focus:outline-none focus:ring-2 focus:ring-pink-300 transition">

<input id="email" type="email" placeholder="Email"
class="w-full mb-4 p-3 rounded-xl bg-white/10 text-white placeholder-white/70
focus:outline-none focus:ring-2 focus:ring-pink-300 transition">

<input id="password" type="password" placeholder="Password"
class="w-full mb-6 p-3 rounded-xl bg-white/10 text-white placeholder-white/70
focus:outline-none focus:ring-2 focus:ring-pink-300 transition">

<button id="signup"
class="w-full py-3 rounded-xl bg-gradient-to-r from-pink-500 to-purple-500
text-white font-semibold shadow-lg hover:shadow-pink-500/40
hover:scale-105 transition duration-300">
Sign Up
</button>

<p class="text-center text-white/70 text-sm mt-4">
Already have account? <a href="login.html" class="text-pink-200 hover:underline">Login</a>
</p>

</div>

<!-- Waves -->
<div class="absolute bottom-0 left-0 w-full">
<svg class="wave w-[200%]" viewBox="0 0 1440 320">
<path fill="#ffffff" fill-opacity="0.2"
d="M0,160L80,170C160,180,320,200,480,186C640,173,800,120,960,112C1120,105,1280,150,1360,170L1440,192L1440,320L0,320Z"/>
</svg>

<svg class="wave w-[200%] mt-[-120px]" viewBox="0 0 1440 320">
<path fill="#ffffff" fill-opacity="0.35"
d="M0,192L80,186C160,181,320,171,480,165C640,160,800,160,960,165C1120,171,1280,181,1360,186L1440,192L1440,320L0,320Z"/>
</svg>
</div>

<!-- JS -->
<script>
document.getElementById("signup").addEventListener("click", function () {

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

if (name && email && password) {
    localStorage.setItem("name", name);
    localStorage.setItem("email", email);
    localStorage.setItem("password", password);

    alert("Signup Successful 🚀");
    window.location.href = "login.html";
} else {
    alert("Please fill all fields");
}

});
</script>

</body>
</html>
